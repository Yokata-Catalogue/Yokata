                  {s.items.slice(0,2).map((it,idx)=>(
                    <div key={idx} style={{position:"relative",width:56,height:56,flexShrink:0}}>
                      {it.photo?<img src={it.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{width:"100%",height:"100%",background:"#f4f3f0",display:"flex",alignItems:"center",justifyContent:"center"}}>🖼️</div>}
                      {it.qty>1&&<div style={{position:"absolute",bottom:2,right:2,background:"rgba(0,0,0,0.7)",color:"#fff",borderRadius:5,padding:"1px 4px",fontSize:9,fontWeight:700}}>×{it.qty}</div>}
                    </div>
                  ))}
                </div>
                <div style={{flex:1,padding:"8px 10px",display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
                  <p style={{margin:0,fontSize:12,fontWeight:600}}>{s.isDonation&&"🎁 "}{s.items.map(i=>i.name+(i.qty>1?" ×"+i.qty:"")).join(" + ")}</p>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:13,fontWeight:700,color:"#6b6b80"}}>{hhmm(s.timestamp)} {PAY[s.paymentMethod]||"💵"}</span>
                    <span style={{fontWeight:800,fontSize:16,color:s.isDonation?"#aaa":"#1a6b3a"}}>{s.isDonation?"Don":euro(s.total)}</span>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>}
        {tab==="prod"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <h2 style={{margin:0,fontSize:15,fontWeight:700}}>Produits ({products.length})</h2>
            <button onClick={()=>{setEditProd(null);setShowProd(true);}} style={{padding:"8px 14px",background:"#1a1a2e",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:13}}>+ Produit</button>
          </div>
          {products.length===0?<div style={{textAlign:"center",padding:"2rem",color:"#aaa",background:"#fff",borderRadius:12,border:"1px solid #eee"}}><p style={{fontSize:28}}>📦</p><p>Ajoute tes premiers produits</p></div>
          :Object.entries(groupP(products)).map(([manga,catMap])=>(
            <div key={manga} style={{marginBottom:14}}>
              <p style={{margin:"0 0 6px",fontSize:11,fontWeight:800,color:"#6b6b80",textTransform:"uppercase",letterSpacing:"0.05em"}}>{manga}</p>
              {Object.entries(catMap).map(([cat,ps])=>(
                <div key={cat} style={{marginBottom:10}}>
                  <p style={{margin:"0 0 5px",fontSize:11,color:"#ccc",fontStyle:"italic"}}>{cat}</p>
                  {ps.map(p=>(
                    <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,background:"#fff",border:"1px solid #eee",borderRadius:10,padding:"9px 12px",marginBottom:5}}>
                      {p.photo?<img src={p.photo} alt="" style={{width:42,height:42,borderRadius:8,objectFit:"cover",flexShrink:0}}/>:<div style={{width:42,height:42,borderRadius:8,background:"#f4f3f0",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🖼️</div>}
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:5}}><span style={{fontWeight:600,fontSize:13}}>{p.name}</span>{p.isPack&&<span style={{fontSize:9,background:"#e8f4e8",color:"#2a7a2a",padding:"2px 5px",borderRadius:4,fontWeight:700}}>LOT</span>}</div>
                        <div style={{display:"flex",gap:8,marginTop:2,flexWrap:"wrap"}}>
                          <span style={{fontSize:12,fontWeight:700,color:"#1a6b3a"}}>{euro(p.price)}</span>
                          {p.costPrice>0&&<span style={{fontSize:11,color:"#aaa"}}>revient {euro(p.costPrice)}</span>}
                          {p.price>0&&p.costPrice>=0&&<span style={{fontSize:11,fontWeight:700,color:"#6b7aed",background:"#eef0fd",padding:"1px 6px",borderRadius:10}}>{(((p.price-(p.costPrice||0))/p.price)*100).toFixed(0)}% marge</span>}
                          <span style={{fontSize:11,color:p.stock<=2?"#e05050":"#aaa"}}>stock: {p.stock}</span>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:4}}>
                        <button onClick={()=>{setEditProd(p);setShowProd(true);}} style={{padding:"5px 9px",border:"1px solid #eee",borderRadius:6,background:"none",cursor:"pointer",fontSize:12}}>✏️</button>
                        <button onClick={()=>delProd(p.id)} style={{padding:"5px 9px",border:"1px solid #ffd4d4",borderRadius:6,background:"none",cursor:"pointer",fontSize:12}}>🗑️</button>
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          ))}
        </div>}
        {tab==="sales"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <h2 style={{margin:0,fontSize:15,fontWeight:700}}>Ventes ({sales.filter(s=>!s.isDonation).length})</h2>
            <button onClick={()=>setShowCat(true)} style={{padding:"8px 14px",background:"#1a6b3a",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:13}}>+ Vente</button>
          </div>
          {sales.length===0?<div style={{textAlign:"center",padding:"2rem",color:"#aaa",background:"#fff",borderRadius:12,border:"1px solid #eee"}}><p>Aucune vente</p></div>
          :[...sales].reverse().map(s=>(
            <div key={s.id} style={{background:"#fff",border:"1px solid #eee",borderRadius:13,marginBottom:9,overflow:"hidden"}}>
              <div style={{display:"flex"}}>
                <div style={{display:"flex",flexShrink:0}}>
                  {s.items.slice(0,3).map((it,idx)=>(
                    <div key={idx} style={{position:"relative",width:72,height:72,flexShrink:0}}>
                      {it.photo?<img src={it.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{width:"100%",height:"100%",background:"#f4f3f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🖼️</div>}
                      {it.qty>1&&<div style={{position:"absolute",bottom:3,right:3,background:"rgba(0,0,0,0.7)",color:"#fff",borderRadius:7,padding:"1px 5px",fontSize:10,fontWeight:700}}>×{it.qty}</div>}
                    </div>
                  ))}
                  {s.items.length>3&&<div style={{width:72,height:72,background:"#f4f3f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#6b6b80"}}>+{s.items.length-3}</div>}
                </div>
                <div style={{flex:1,padding:"10px 12px",display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <p style={{margin:0,fontSize:13,fontWeight:600,flex:1,lineHeight:1.3}}>
                      {s.isDonation&&<span style={{fontSize:10,background:"#fff3cd",color:"#856404",padding:"1px 5px",borderRadius:4,fontWeight:700,marginRight:5}}>DON</span>}
                      {s.items.map(i=>i.name+(i.qty>1?" ×"+i.qty:"")).join(" + ")}
                    </p>
                    <button onClick={()=>delSale(s.id)} style={{padding:"2px 6px",border:"1px solid #ffd4d4",borderRadius:5,background:"none",cursor:"pointer",fontSize:10,color:"#e05050",marginLeft:8,flexShrink:0}}>✕</button>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:15,fontWeight:800,color:"#1a1a2e"}}>{hhmm(s.timestamp)}</span>
                      <span>{PAY[s.paymentMethod]||"💵"}</span>
                      {s.discount>0&&<span style={{fontSize:10,background:"#fff0e0",color:"#c07a20",padding:"1px 5px",borderRadius:4,fontWeight:600}}>-{euro(s.discount)}</span>}
                    </div>
                    <span style={{fontWeight:800,fontSize:18,color:s.isDonation?"#aaa":"#1a6b3a"}}>{s.isDonation?"Don 🎁":euro(s.total)}</span>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>}
        {tab==="costs"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <h2 style={{margin:0,fontSize:15,fontWeight:700}}>Frais</h2>
            {!editCosts&&<button onClick={()=>setEditCosts(true)} style={{padding:"8px 14px",border:"1px solid #ddd",borderRadius:8,background:"none",cursor:"pointer",fontSize:13}}>Modifier</button>}
          </div>
          <div style={{background:"#fff",border:"1px solid #eee",borderRadius:12,padding:"1rem 1.1rem"}}>
            {editCosts?(<>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[["ticket","Stand/billet"],["airbnb","Airbnb"],["transport","Transport"],["other","Autres"]].map(([k,lb])=>(
                  <Row key={k} label={lb+" (€)"}><input type="number" value={costsS[k]||""} onChange={e=>setCostsS(cs=>({...cs,[k]:e.target.value}))} style={{width:"100%",boxSizing:"border-box",padding:"10px 12px",border:"1px solid #e0e0e8",borderRadius:8,fontSize:14,outline:"none"}}/></Row>
                ))}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setEditCosts(false)} style={{flex:1,padding:10,border:"1px solid #ddd",borderRadius:8,background:"none",cursor:"pointer"}}>Annuler</button>
                <button onClick={saveCosts} style={{flex:1,padding:10,background:"#1a1a2e",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}}>Enregistrer</button>
              </div>
            </>):(<>
              {[["ticket","Stand/billet"],["airbnb","Airbnb"],["transport","Transport"],["other","Autres"]].map(([k,lb])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #f5f5fa"}}><span style={{color:"#6b6b80"}}>{lb}</span><span style={{fontWeight:600}}>{euro(parseFloat(event.costs?.[k])||0)}</span></div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",padding:"12px 0 4px",fontWeight:700,fontSize:15}}><span>Total frais fixes</span><span style={{color:"#e05050"}}>{euro(c.fixed)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,paddingBottom:4}}><span style={{color:"#6b6b80"}}>Coût de revient</span><span style={{fontWeight:500}}>{euro(c.cogs)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid #f5f5fa",paddingTop:10,fontWeight:700,fontSize:14}}><span>À rentrer pour être à 0</span><span style={{color:"#e05050"}}>{euro(c.fixed+c.cogs)}</span></div>
            </>)}
          </div>
        </div>}
        {tab==="photos"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h2 style={{margin:0,fontSize:15,fontWeight:700}}>Photos ({photos.length})</h2>
            <label style={{padding:"8px 14px",background:"#1a1a2e",color:"#fff",borderRadius:8,cursor:"pointer",fontWeight:600,fontSize:13}}>📷 Ajouter<input type="file" accept="image/*" multiple onChange={addPhotos} style={{display:"none"}}/></label>
          </div>
          {photos.length===0?<div style={{textAlign:"center",padding:"3rem",color:"#aaa",background:"#fff",borderRadius:12,border:"1px solid #eee"}}><p style={{fontSize:36}}>📸</p><p style={{fontWeight:600,color:"#6b6b80"}}>Aucune photo</p></div>
          :<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {photos.map(ph=>(
              <div key={ph.id} style={{borderRadius:12,overflow:"hidden",border:"1px solid #eee",background:"#fff"}}>
                <div style={{position:"relative"}}><img src={ph.src} alt="" style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}}/><button onClick={()=>onUpdate({...event,eventPhotos:photos.filter(p=>p.id!==ph.id)})} style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,0.55)",border:"none",borderRadius:7,padding:"3px 7px",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>✕</button></div>
                <input value={ph.caption||""} onChange={e=>onUpdate({...event,eventPhotos:photos.map(p=>p.id===ph.id?{...p,caption:e.target.value}:p)})} placeholder="Légende…" style={{width:"100%",boxSizing:"border-box",border:"none",borderTop:"1px solid #f0f0f5",padding:"7px 10px",fontSize:12,outline:"none"}}/>
              </div>
            ))}
          </div>}
        </div>}
        {tab==="recap"&&(()=>{
          const real=sales.filter(s=>!s.isDonation);
          const soldMap={};
          real.forEach(s=>s.items.forEach(it=>{if(!soldMap[it.productId])soldMap[it.productId]={productId:it.productId,name:it.name,photo:it.photo,price:it.price,qty:0,revenue:0};soldMap[it.productId].qty+=it.qty;soldMap[it.productId].revenue+=it.price*it.qty;}));
          const byQty=Object.values(soldMap).sort((a,b)=>b.qty-a.qty);
          const payBrk={especes:0,carte:0,mixte:0};real.forEach(s=>{payBrk[s.paymentMethod||"especes"]+=s.total;});
          const payTot=Object.values(payBrk).reduce((t,v)=>t+v,0);
          const avg=real.length>0?c.gross/real.length:0;
          const hm={};real.forEach(s=>{const h=new Date(s.timestamp).getHours();hm[h]=(hm[h]||0)+1;});
          const peak=Object.entries(hm).sort((a,b)=>b[1]-a[1])[0];
          const rentab=c.gross>0?((c.net/c.gross)*100).toFixed(1):null;
          const mps=products.filter(p=>p.price>0&&p.costPrice>=0);
          const avgMarg=mps.length>0?(mps.reduce((t,p)=>t+((p.price-(p.costPrice||0))/p.price)*100,0)/mps.length).toFixed(1):null;
          return(<div>
            <div style={{background:"#1a1a2e",borderRadius:14,padding:"1.25rem",marginBottom:14,color:"#fff"}}>
              <p style={{margin:"0 0 14px",fontSize:11,color:"rgba(255,255,255,0.45)",textTransform:"uppercase"}}>Récapitulatif final</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                <div style={{background:"rgba(111,207,151,0.15)",borderRadius:10,padding:"10px 12px"}}><p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.45)",textTransform:"uppercase"}}>CA brut</p><p style={{margin:"4px 0 0",fontWeight:900,fontSize:22,color:"#6fcf97"}}>{euro(c.gross)}</p></div>
                <div style={{background:c.net>=0?"rgba(111,207,151,0.15)":"rgba(235,87,87,0.15)",borderRadius:10,padding:"10px 12px"}}><p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.45)",textTransform:"uppercase"}}>Net final</p><p style={{margin:"4px 0 0",fontWeight:900,fontSize:22,color:c.net>=0?"#6fcf97":"#eb5757"}}>{euro(c.net)}</p></div>
                <div style={{background:"rgba(242,153,74,0.12)",borderRadius:10,padding:"10px 12px"}}><p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.45)",textTransform:"uppercase"}}>Coût de revient</p><p style={{margin:"4px 0 0",fontWeight:700,fontSize:17,color:"#f2994a"}}>{euro(c.cogs)}</p></div>
                <div style={{background:"rgba(235,87,87,0.12)",borderRadius:10,padding:"10px 12px"}}><p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.45)",textTransform:"uppercase"}}>Frais fixes</p><p style={{margin:"4px 0 0",fontWeight:700,fontSize:17,color:"#eb5757"}}>{euro(c.fixed)}</p></div>
              </div>
              <div style={{borderTop:"1px solid rgba(255,255,255,0.1)",paddingTop:12,display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                <div><p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.4)"}}>Transactions</p><p style={{margin:"2px 0 0",fontWeight:700,fontSize:14}}>{real.length}</p></div>
                <div><p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.4)"}}>Panier moyen</p><p style={{margin:"2px 0 0",fontWeight:700,fontSize:14}}>{euro(avg)}</p></div>
                <div><p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.4)"}}>Heure de pointe</p><p style={{margin:"2px 0 0",fontWeight:700,fontSize:14}}>{peak?peak[0]+"h":"—"}</p></div>
              </div>
              <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.1)",display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div style={{background:rentab>=0?"rgba(111,207,151,0.15)":"rgba(235,87,87,0.15)",borderRadius:8,padding:"8px 10px"}}><p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.45)",textTransform:"uppercase"}}>Taux rentabilité</p><p style={{margin:"3px 0 0",fontWeight:900,fontSize:20,color:rentab>=0?"#6fcf97":"#eb5757"}}>{rentab!==null?rentab+"%":"—"}</p><p style={{margin:"2px 0 0",fontSize:9,color:"rgba(255,255,255,0.35)"}}>net / brut</p></div>
                <div style={{background:"rgba(242,153,74,0.12)",borderRadius:8,padding:"8px 10px"}}><p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.45)",textTransform:"uppercase"}}>Marge moy. produits</p><p style={{margin:"3px 0 0",fontWeight:900,fontSize:20,color:"#f2994a"}}>{avgMarg!==null?avgMarg+"%":"—"}</p><p style={{margin:"2px 0 0",fontSize:9,color:"rgba(255,255,255,0.35)"}}>prix vente − revient</p></div>
              </div>
            </div>
            {payTot>0&&<div style={{background:"#fff",border:"1px solid #eee",borderRadius:12,padding:"1rem 1.1rem",marginBottom:12}}>
              <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:"#6b6b80",textTransform:"uppercase"}}>Répartition paiements</p>
              {[["especes","💵 Espèces"],["carte","💳 Carte"],["mixte","🔀 Mixte"]].map(([k,lb])=>{const pct=payTot>0?Math.round((payBrk[k]/payTot)*100):0;return payBrk[k]>0?(<div key={k} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:13}}>{lb}</span><span style={{fontSize:13,fontWeight:700}}>{euro(payBrk[k])} <span style={{color:"#aaa",fontWeight:400}}>({pct}%)</span></span></div><div style={{height:6,background:"#f0f0f5",borderRadius:4}}><div style={{height:"100%",width:pct+"%",background:"#1a1a2e",borderRadius:4}}/></div></div>):null;})}
            </div>}
            {byQty.length>0&&<div style={{background:"#fff",border:"1px solid #eee",borderRadius:12,padding:"1rem 1.1rem",marginBottom:12}}>
              <p style={{margin:"0 0 12px",fontSize:11,fontWeight:700,color:"#6b6b80",textTransform:"uppercase"}}>🏆 Best sellers</p>
              {byQty.slice(0,8).map((it,idx)=>(
                <div key={it.productId} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:idx<byQty.length-1?"1px solid #f5f5fa":"none"}}>
                  <span style={{fontSize:16,minWidth:24,textAlign:"center"}}>{idx===0?"🥇":idx===1?"🥈":idx===2?"🥉":idx+1+"."}</span>
                  {it.photo?<img src={it.photo} alt="" style={{width:40,height:40,borderRadius:8,objectFit:"cover",flexShrink:0}}/>:<div style={{width:40,height:40,borderRadius:8,background:"#f4f3f0",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>🖼️</div>}
                  <div style={{flex:1}}><p style={{margin:0,fontSize:13,fontWeight:600}}>{it.name}</p><p style={{margin:"1px 0 0",fontSize:11,color:"#aaa"}}>{euro(it.price)} · {it.qty} vendu{it.qty>1?"s":""}</p></div>
                  <div style={{textAlign:"right"}}><p style={{margin:0,fontWeight:800,fontSize:14,color:"#1a6b3a"}}>{euro(it.revenue)}</p></div>
                </div>
              ))}
            </div>}
            {real.length===0&&<div style={{textAlign:"center",padding:"2rem",color:"#aaa",background:"#fff",borderRadius:12,border:"1px solid #eee"}}><p style={{fontSize:28}}>📊</p><p>Aucune vente pour le récap</p></div>}
          </div>);
        })()}
      </div>
      {showCat&&<Catalog event={event} onSale={handleSale} onClose={()=>setShowCat(false)}/>}
      {showProd&&<Sheet title={editProd?"Modifier le produit":"Ajouter un produit"} onClose={()=>{setShowProd(false);setEditProd(null);}}><ProductForm existing={editProd} onSave={saveProd} onClose={()=>{setShowProd(false);setEditProd(null);}} mangaList={mangaList}/></Sheet>}
    </div>
  );
}

/* ── EVENTS LIST ── */
function EventsList({events,onSelect,onCreate,onEdit,onDelete,onImport,onHistory,candidatures,onSaveCandidature,onDeleteCandidature}){
  const[tab,setTab]=useState("events");
  const TABS=[{id:"events",label:"Événements"},{id:"planning",label:"Planning"},{id:"stats",label:"Bilan"},{id:"backup",label:"Sauvegarde"}];
  return(
    <div style={{minHeight:"100vh",background:"#f8f7f5"}}>
      <div style={{background:"#1a1a2e",color:"#fff",padding:"1.5rem 1.25rem 1.1rem"}}>
        <h1 style={{margin:0,fontSize:22,fontWeight:800,letterSpacing:"-0.02em"}}>🎌 Yokata Catalogue</h1>
        <p style={{margin:"4px 0 0",color:"rgba(255,255,255,0.5)",fontSize:13}}>Suivi stock & ventes</p>
      </div>
      <div style={{display:"flex",background:"#fff",borderBottom:"1px solid #eee"}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"12px 4px",border:"none",background:"none",cursor:"pointer",fontSize:13,fontWeight:tab===t.id?700:400,color:tab===t.id?"#1a1a2e":"#6b6b80",borderBottom:tab===t.id?"2.5px solid #1a1a2e":"2.5px solid transparent"}}>{t.label}</button>)}
      </div>
      {tab==="stats"&&<GlobalStats events={events}/>}
      {tab==="backup"&&<BackupTab events={events} candidatures={candidatures} onImport={onImport}/>}
      {tab==="planning"&&<Planning candidatures={candidatures} onSaveCandidature={onSaveCandidature} onDeleteCandidature={onDeleteCandidature}/>}
      {tab==="events"&&<div style={{padding:"1rem 1.1rem"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          <button onClick={onCreate} style={{padding:"13px",background:"#1a1a2e",color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer"}}>+ Nouvel événement</button>
          <button onClick={onHistory} style={{padding:"13px",background:"#fff",color:"#1a1a2e",border:"1.5px solid #1a1a2e",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer"}}>📅 Historique</button>
        </div>
        {events.length===0?<div style={{textAlign:"center",padding:"3rem 1rem",color:"#aaa"}}><p style={{fontSize:40}}>🎪</p><p style={{fontSize:16,fontWeight:600,color:"#6b6b80"}}>Aucun événement</p><p style={{fontSize:13}}>Crée ton premier événement pour commencer</p></div>
        :[...events].sort((a,b)=>new Date(b.dateStart||b.date)-new Date(a.dateStart||a.date)).map(ev=>{
          const c=calcEv(ev);
          return(<div key={ev.id} onClick={()=>onSelect(ev.id)} style={{background:"#fff",border:"1px solid #eee",borderRadius:12,padding:"13px 15px",marginBottom:9,cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <p style={{margin:0,fontWeight:700,fontSize:15}}>{ev.name}</p>
                  {ev.isHistoric&&<span style={{fontSize:9,background:"#fff8e8",color:"#856404",padding:"1px 5px",borderRadius:8,fontWeight:700,border:"1px solid #f2d98a"}}>HISTORIQUE</span>}
                </div>
                <p style={{margin:"2px 0 7px",fontSize:12,color:"#6b6b80"}}>{ev.location&&ev.location+" · "}{drange(ev.dateStart||ev.date,ev.dateEnd)}</p>
                <div style={{display:"flex",gap:12}}>
                  <span style={{fontSize:13}}><span style={{color:"#aaa"}}>Brut </span><strong style={{color:"#1a6b3a"}}>{euro(c.gross)}</strong></span>
                  <span style={{fontSize:13}}><span style={{color:"#aaa"}}>Net </span><strong style={{color:c.net>=0?"#1a6b3a":"#e05050"}}>{euro(c.net)}</strong></span>
                  <span style={{fontSize:13,color:"#aaa"}}>{c.count} ventes</span>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:17}}>{c.net>=0?"🟢":"🔴"}</span>
                <button onClick={e=>{e.stopPropagation();onEdit(ev.id);}} style={{padding:"5px 9px",border:"1px solid #eee",borderRadius:6,background:"none",cursor:"pointer",fontSize:12}}>✏️</button>
                <button onClick={e=>{e.stopPropagation();if(confirm("Supprimer "+ev.name+" ? Cette action est irréversible."))onDelete(ev.id);}} style={{padding:"5px 9px",border:"1px solid #ffd4d4",borderRadius:6,background:"none",cursor:"pointer",fontSize:12,color:"#e05050"}}>🗑️</button>
              </div>
            </div>
          </div>);
        })}
      </div>}
    </div>
  );
}

/* ── APP ── */
function App(){
  const K="convention_tracker_v1",PK="convention_products_v1",CK="convention_candidatures_v1";
  const[events,setEvRaw]=useState(()=>{try{const s=localStorage.getItem(K);return s?JSON.parse(s):[];}catch{return[];}});
  const[gProds,setGPRaw]=useState(()=>{try{const s=localStorage.getItem(PK);return s?JSON.parse(s):[];}catch{return[];}});
  const[cands,setCands]=useState(()=>{try{const s=localStorage.getItem(CK);return s?JSON.parse(s):[];}catch{return[];}});
  const[selId,setSelId]=useState(null);
  const[showForm,setShowForm]=useState(false);
  const[showHist,setShowHist]=useState(false);
  const[editId,setEditId]=useState(null);
  useEffect(()=>{try{localStorage.setItem(K,JSON.stringify(events));}catch{}},[events]);
  useEffect(()=>{try{localStorage.setItem(PK,JSON.stringify(gProds));}catch{}},[gProds]);
  useEffect(()=>{try{localStorage.setItem(CK,JSON.stringify(cands));}catch{}},[cands]);
  function saveEv(ev){setEvRaw(p=>{const ex=p.find(e=>e.id===ev.id);return ex?p.map(e=>e.id===ev.id?ev:e):[...p,ev];});}
  function deleteEv(id){setEvRaw(p=>p.filter(e=>e.id!==id));}
  function updateEv(ev){
    setEvRaw(p=>p.map(e=>e.id===ev.id?ev:e));
    if(ev.products){setGPRaw(p=>{let u=[...p];ev.products.forEach(prod=>{const i=u.findIndex(g=>g.id===prod.id);if(i>=0)u[i]={...prod,stock:u[i].stock};else u.push(prod);});return u;});}
  }
  function doImport(evs,cs){if(confirm("Importer "+evs.length+" événement(s) ? Cela remplace tout.")){setEvRaw(evs);if(cs)setCands(cs);}}
  function saveCand(c){setCands(p=>{const ex=p.find(e=>e.id===c.id);return ex?p.map(e=>e.id===c.id?c:e):[...p,c];});}
  function delCand(id){setCands(p=>p.filter(c=>c.id!==id));}
  const sel=events.find(e=>e.id===selId);
  const editEv=events.find(e=>e.id===editId);
  const selWithP=sel?{...sel,products:sel.products?.length>0?sel.products:gProds.map(p=>({...p,stock:p.stock||0}))}:null;
  if(selWithP)return <EventDetail event={selWithP} onUpdate={updateEv} onBack={()=>setSelId(null)}/>;
  return(<>
    <EventsList events={events} onSelect={id=>setSelId(id)} onCreate={()=>{setEditId(null);setShowForm(true);}} onEdit={id=>{setEditId(id);setShowForm(true);}} onDelete={deleteEv} onImport={doImport} onHistory={()=>setShowHist(true)} candidatures={cands} onSaveCandidature={saveCand} onDeleteCandidature={delCand}/>
    {showForm&&<Sheet title={editId?"Modifier l'événement":"Nouvel événement"} onClose={()=>{setShowForm(false);setEditId(null);}}>
      <EventForm existing={editEv||null} onSave={ev=>{saveEv(ev);setShowForm(false);setEditId(null);if(editId)setSelId(ev.id);}} onClose={()=>{setShowForm(false);setEditId(null);}}/>
    </Sheet>}
    {showHist&&<Sheet title="📅 Ajouter un historique" onClose={()=>setShowHist(false)}>
      <HistoricForm onSave={ev=>{saveEv(ev);setShowHist(false);}} onClose={()=>setShowHist(false)}/>
    </Sheet>}
  </>);
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
