<script type="text/babel">
const {useState,useEffect,useRef}=React;
const CATS=["Géant","Grand","Moyen","Mini"];
const STATUTS=[
  {id:"prospect",label:"À candidater",color:"#6b7aed",bg:"#eef0fd",border:"#b8bef5",emoji:"💜"},
  {id:"envoye",label:"Dossier envoyé",color:"#f2994a",bg:"#fff4ea",border:"#f5c894",emoji:"🟠"},
  {id:"accepte",label:"Accepté ✓",color:"#1a6b3a",bg:"#e8f5e8",border:"#8dd4a0",emoji:"🟢"},
  {id:"refuse",label:"Refusé ✗",color:"#c0392b",bg:"#fde8e8",border:"#f5a8a8",emoji:"🔴"},
];
const MOIS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const PAY={especes:"💵",carte:"💳",mixte:"🔀"};
const gid=()=>Math.random().toString(36).slice(2,10);
const euro=v=>new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR"}).format(v||0);
const hhmm=ts=>new Date(ts).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
function drange(a,b){
  if(!a)return"";
  const fa=new Date(a),o={day:"numeric",month:"long",year:"numeric"};
  if(!b||a===b)return fa.toLocaleDateString("fr-FR",o);
  const fb=new Date(b);
  if(fa.getMonth()===fb.getMonth()&&fa.getFullYear()===fb.getFullYear())
    return fa.getDate()+" – "+fb.toLocaleDateString("fr-FR",o);
  return fa.toLocaleDateString("fr-FR",{day:"numeric",month:"long"})+" – "+fb.toLocaleDateString("fr-FR",o);
}
function calcEv(ev){
  const s=ev.sales||[],p=ev.products||[];
  const gross=s.filter(x=>!x.isDonation).reduce((t,x)=>t+x.total,0);
  const fixed=Object.values(ev.costs||{}).reduce((t,v)=>t+(parseFloat(v)||0),0);
  const cogs=s.filter(x=>!x.isDonation).reduce((t,x)=>t+x.items.reduce((ti,it)=>{const pr=p.find(q=>q.id===it.productId);return ti+(pr?pr.costPrice||0:0)*it.qty;},0),0);
  return{gross,fixed,cogs,net:gross-fixed-cogs,count:s.filter(x=>!x.isDonation).length};
}
function groupP(prods){
  const g={};
  [...prods].sort((a,b)=>(a.sortOrder||999)-(b.sortOrder||999)).forEach(p=>{
    const m=p.manga||"Autres";
    if(!g[m])g[m]={};
    if(!g[m][p.category])g[m][p.category]=[];
    g[m][p.category].push(p);
  });
  return g;
}
const Lbl=({c})=><p style={{margin:"0 0 5px",fontSize:11,fontWeight:600,color:"#6b6b80",textTransform:"uppercase",letterSpacing:"0.05em"}}>{c}</p>;
function Inp({value,onChange,type="text",placeholder="",min,step,list,rows}){
  const s={width:"100%",boxSizing:"border-box",padding:"10px 12px",border:"1px solid #e0e0e8",borderRadius:8,fontSize:14,outline:"none",background:"#fff",color:"#1a1a2e"};
  if(rows)return <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{...s,resize:"vertical"}}/>;
  return <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} min={min} step={step} list={list} style={s}/>;
}
function Row({label,children}){return <div style={{marginBottom:12}}><Lbl c={label}/>{children}</div>;}
function Sheet({title,onClose,children}){
  return(
    <div style={{position:"fixed",inset:0,zIndex:800,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:"18px 18px 0 0",width:"100%",maxWidth:560,maxHeight:"92vh",display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"1rem 1.25rem",borderBottom:"1px solid #f0f0f5",flexShrink:0}}>
          <span style={{fontWeight:700,fontSize:16}}>{title}</span>
          <button onClick={onClose} style={{border:"none",background:"#f0f0f5",borderRadius:8,padding:"6px 10px",fontSize:15,cursor:"pointer",fontWeight:700,color:"#6b6b80"}}>✕</button>
        </div>
        <div style={{overflowY:"auto",padding:"1rem 1.25rem",flex:1}}>{children}</div>
      </div>
    </div>
  );
}

/* ── EVENT FORM ── */
function EventForm({existing,onSave,onClose}){
  const[name,setName]=useState(existing?.name||"");
  const[ds,setDs]=useState(existing?.dateStart||existing?.date||new Date().toISOString().slice(0,10));
  const[de,setDe]=useState(existing?.dateEnd||"");
  const[loc,setLoc]=useState(existing?.location||"");
  const[costs,setCosts]=useState(existing?.costs||{ticket:"",airbnb:"",transport:"",other:""});
  const total=Object.values(costs).reduce((t,v)=>t+(parseFloat(v)||0),0);
  const ci=k=>v=>setCosts(c=>({...c,[k]:v}));
  function save(){
    if(!name.trim()){alert("Nom requis");return;}
    onSave({id:existing?.id||gid(),name:name.trim(),dateStart:ds,dateEnd:de,location:loc,costs,totalCosts:total,
      products:existing?.products||[],sales:existing?.sales||[],eventPhotos:existing?.eventPhotos||[],createdAt:existing?.createdAt||Date.now()});
    onClose();
  }
  return(<>
    <Row label="Nom"><Inp value={name} onChange={setName} placeholder="Japan Expo 2025…"/></Row>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Row label="Début"><Inp type="date" value={ds} onChange={setDs}/></Row>
      <Row label="Fin"><Inp type="date" value={de} onChange={setDe}/></Row>
    </div>
    <Row label="Lieu"><Inp value={loc} onChange={setLoc} placeholder="Paris, Lyon…"/></Row>
    <div style={{background:"#f8f8fc",borderRadius:10,padding:"1rem",marginBottom:14}}>
      <p style={{margin:"0 0 10px",fontWeight:700,fontSize:12,color:"#6b6b80",textTransform:"uppercase"}}>Frais</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Row label="Stand/billet (€)"><Inp type="number" value={costs.ticket} onChange={ci("ticket")} placeholder="0" min="0"/></Row>
        <Row label="Airbnb (€)"><Inp type="number" value={costs.airbnb} onChange={ci("airbnb")} placeholder="0" min="0"/></Row>
        <Row label="Transport (€)"><Inp type="number" value={costs.transport} onChange={ci("transport")} placeholder="0" min="0"/></Row>
        <Row label="Autres (€)"><Inp type="number" value={costs.other} onChange={ci("other")} placeholder="0" min="0"/></Row>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",paddingTop:8,borderTop:"1px solid #e8e8f0",fontWeight:700}}>
        <span>Total frais</span><span style={{color:"#e05050"}}>{euro(total)}</span>
      </div>
    </div>
    <button onClick={save} style={{width:"100%",padding:"12px",background:"#1a1a2e",color:"#fff",border:"none",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer"}}>
      {existing?"Mettre à jour":"Créer l'événement"}
    </button>
  </>);
}

/* ── HISTORIC FORM ── */
function HistoricForm({onSave,onClose}){
  const[name,setName]=useState("");
  const[ds,setDs]=useState("");
  const[de,setDe]=useState("");
  const[loc,setLoc]=useState("");
  const[grossTotal,setGrossTotal]=useState("");
  const[costs,setCosts]=useState({ticket:"",airbnb:"",transport:"",other:""});
  const[prods,setProds]=useState([{id:gid(),name:"",price:"",costPrice:"",manga:"",category:"Moyen"}]);
  const fixed=Object.values(costs).reduce((t,v)=>t+(parseFloat(v)||0),0);
  const gross=parseFloat(grossTotal)||0;
  // Net = brut - frais seulement
  const net=gross-fixed;
  // Marge moyenne des produits saisis (optionnel)
  const margins=prods.filter(p=>parseFloat(p.price)>0&&parseFloat(p.costPrice)>=0);
  const avgMargPct=margins.length>0?(margins.reduce((t,p)=>{const pr=parseFloat(p.price),co=parseFloat(p.costPrice)||0;return t+((pr-co)/pr)*100;},0)/margins.length):null;
  const avgMarg=avgMargPct!==null?avgMargPct.toFixed(1):null;
  // Net net = net - provision coût produits (gross * (1 - marge%))
  const provisionCogs=avgMargPct!==null?gross*(1-avgMargPct/100):null;
  const netNet=provisionCogs!==null?net-provisionCogs:null;
  const rentab=gross>0?((net/gross)*100).toFixed(1):null;
  const rentabNetNet=netNet!==null&&gross>0?((netNet/gross)*100).toFixed(1):null;
  const ci=k=>v=>setCosts(c=>({...c,[k]:v}));
  function addP(){setProds(p=>[...p,{id:gid(),name:"",price:"",costPrice:"",manga:"",category:"Moyen"}]);}
  function delP(id){setProds(p=>p.filter(x=>x.id!==id));}
  function updP(id,k,v){setProds(p=>p.map(x=>x.id===id?{...x,[k]:v}:x));}
  function save(){
    if(!name.trim()){alert("Nom requis");return;}
    if(!ds){alert("Date requise");return;}
    if(!grossTotal){alert("Saisis le CA brut total");return;}
    const bp=prods.filter(p=>p.name.trim()&&parseFloat(p.price)>0).map(p=>({
      id:p.id,name:p.name.trim(),category:p.category,manga:p.manga.trim(),
      price:parseFloat(p.price),costPrice:parseFloat(p.costPrice)||0,stock:0,photo:null,isPack:false,packItems:"",sortOrder:999
    }));
    const sales=[{id:gid(),items:[{productId:"hist-"+gid(),name:"Ventes totales",price:gross,qty:1,photo:null}],
      cartTotal:gross,discount:0,isDonation:false,paymentMethod:"especes",total:gross,
      timestamp:new Date(ds).getTime(),isHistoric:true}];
    onSave({id:gid(),name:name.trim(),dateStart:ds,dateEnd:de||ds,location:loc,
      costs,totalCosts:fixed,products:bp,sales,eventPhotos:[],createdAt:Date.now(),isHistoric:true});
    onClose();
  }
  return(<>
    <div style={{background:"#fff8e8",border:"1px solid #f2d98a",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#856404"}}>
      📅 Mode historique — Saisis le CA total, les frais si tu les as, et les produits pour la marge
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Row label="Début"><Inp type="date" value={ds} onChange={setDs}/></Row>
      <Row label="Fin (optionnel)"><Inp type="date" value={de} onChange={setDe}/></Row>
    </div>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.45)",textTransform:"uppercase"}}>Net net (- frais - coût produits estimé)</p>
              <p style={{margin:"3px 0 0",fontWeight:900,fontSize:22,color:netNet>=0?"#6fcf97":"#eb5757"}}>{euro(netNet)}</p>

            {rentabNetNet!==null&&<div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
              <p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.4)"}}>Rentabilité nette</p>

          <div><p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.4)"}}>Marge moy. produits</p><p style={{margin:"2px 0 0",fontWeight:800,fontSize:13,color:"#f2994a"}}>{avgMarg!==null?avgMarg+"%":"— (pas de produits)"}</p></div>

}

/* ── PRODUCT FORM ── */
function ProductForm({existing,onSave,onClose,mangaList}){
  const[name,setName]=useState(existing?.name||"");
  const[cat,setCat]=useState(existing?.category||"Moyen");
  const[manga,setManga]=useState(existing?.manga||"");
  const[price,setPrice]=useState(existing?.price||"");
  const[cost,setCost]=useState(existing?.costPrice||"");
  const[stock,setStock]=useState(existing?.stock||"");
  const[photo,setPhoto]=useState(existing?.photo||null);
  const[isPack,setIsPack]=useState(existing?.isPack||false);
  const[packDesc,setPackDesc]=useState(existing?.packItems||"");
  const[order,setOrder]=useState(existing?.sortOrder??999);
  const ref=useRef();
  function pickPhoto(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setPhoto(ev.target.result);r.readAsDataURL(f);}
  function save(){
    if(!name.trim()){alert("Nom requis");return;}
    if(!price){alert("Prix requis");return;}
    onSave({id:existing?.id||gid(),name:name.trim(),category:cat,manga:manga.trim(),price:parseFloat(price),costPrice:parseFloat(cost)||0,stock:parseInt(stock)||0,photo,isPack,packItems:packDesc.trim(),sortOrder:parseInt(order)||999});
    onClose();
  }
  return(<>
    <div style={{display:"flex",gap:12,marginBottom:14}}>
      <button onClick={()=>ref.current.click()} style={{width:80,height:80,flexShrink:0,borderRadius:12,border:"1px dashed #ccc",background:"#f8f8fc",cursor:"pointer",overflow:"hidden",padding:0}}>
        {photo?<img src={photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:28}}>📷</span>}
      </button>
      <input ref={ref} type="file" accept="image/*" onChange={pickPhoto} style={{display:"none"}}/>
      <div style={{flex:1}}>
        <Row label="Nom du produit"><Inp value={name} onChange={setName} placeholder="Miroir Naruto…"/></Row>
        <Row label="Manga / série"><Inp value={manga} onChange={setManga} placeholder="Naruto…" list="mdl"/><datalist id="mdl">{(mangaList||[]).map(m=><option key={m} value={m}/>)}</datalist></Row>
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Row label="Catégorie"><select value={cat} onChange={e=>setCat(e.target.value)} style={{width:"100%",padding:"10px 12px",border:"1px solid #e0e0e8",borderRadius:8,fontSize:14,background:"#fff"}}>{CATS.map(c=><option key={c}>{c}</option>)}</select></Row>
      <Row label="Ordre"><Inp type="number" value={order} onChange={setOrder} placeholder="1,2…" min="0"/></Row>
      <Row label="Prix vente (€)"><Inp type="number" value={price} onChange={setPrice} min="0" step="0.5"/></Row>
      <Row label="Prix revient (€)"><Inp type="number" value={cost} onChange={setCost} min="0" step="0.5"/></Row>
      <Row label="Stock initial"><Inp type="number" value={stock} onChange={setStock} min="0"/></Row>
    </div>
    <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,cursor:"pointer",fontSize:14}}>
      <input type="checkbox" checked={isPack} onChange={e=>setIsPack(e.target.checked)} style={{width:16,height:16}}/> Lot / pack
    </label>
    {isPack&&<Row label="Contenu du pack"><Inp value={packDesc} onChange={setPackDesc} placeholder="1 Grand + 1 Mini…" rows={2}/></Row>}
    <button onClick={save} style={{width:"100%",padding:"12px",background:"#1a1a2e",color:"#fff",border:"none",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer"}}>{existing?"Modifier":"Ajouter le produit"}</button>
  </>);
}

/* ── CART ── */
function Cart({cart,products,onAdd,onRemove,onConfirm,onClose}){
  const[disc,setDisc]=useState(0);
  const[pay,setPay]=useState("especes");
  const[isDon,setIsDon]=useState(false);
  const raw=cart.reduce((t,i)=>t+i.price*i.qty,0);
  const fin=Math.max(0,raw-disc);
  return(
    <div style={{position:"fixed",inset:0,zIndex:900,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:"18px 18px 0 0",width:"100%",maxWidth:560,maxHeight:"88vh",display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"1rem 1.25rem",borderBottom:"1px solid #f0f0f5",flexShrink:0}}>
          <span style={{fontWeight:700,fontSize:16}}>🛒 Panier · {cart.reduce((t,i)=>t+i.qty,0)} art.</span>
          <button onClick={onClose} style={{border:"none",background:"#f0f0f5",borderRadius:8,padding:"6px 10px",fontSize:15,cursor:"pointer",fontWeight:700,color:"#6b6b80"}}>✕</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"0 1.25rem"}}>
          {cart.length===0?<p style={{textAlign:"center",padding:"2rem",color:"#aaa"}}>Panier vide</p>
          :cart.map(item=>{
            const prod=products.find(p=>p.id===item.productId);
            return(<div key={item.productId} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid #f5f5fa"}}>
              {item.photo?<img src={item.photo} alt="" style={{width:44,height:44,borderRadius:8,objectFit:"cover",flexShrink:0}}/>:<div style={{width:44,height:44,borderRadius:8,background:"#f4f3f0",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>🖼️</div>}
              <div style={{flex:1}}><p style={{margin:0,fontWeight:600,fontSize:14}}>{item.name}</p><p style={{margin:"2px 0 0",fontSize:12,color:"#aaa"}}>{euro(item.price)} × {item.qty}</p></div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button onClick={()=>onRemove(item.productId)} style={{width:32,height:32,border:"1px solid #eee",borderRadius:8,background:"#fff",cursor:"pointer",fontSize:18,fontWeight:700,color:"#e05050"}}>−</button>
                <span style={{fontWeight:700,fontSize:15,minWidth:20,textAlign:"center"}}>{item.qty}</span>
                <button onClick={()=>prod&&onAdd(prod)} style={{width:32,height:32,border:"1px solid #eee",borderRadius:8,background:"#fff",cursor:"pointer",fontSize:18,fontWeight:700,color:"#1a6b3a"}}>+</button>
                <span style={{fontWeight:700,fontSize:14,minWidth:52,textAlign:"right"}}>{euro(item.price*item.qty)}</span>
              </div>
            </div>);
          })}
        </div>
        {cart.length>0&&(
          <div style={{padding:"0.75rem 1.25rem 1rem",borderTop:"1px solid #f0f0f5",background:"#fafafa",flexShrink:0}}>
            <Lbl c="Réduction"/>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
              {[5,10,15,20].map(d=><button key={d} onClick={()=>setDisc(disc===d?0:d)} style={{padding:"6px 12px",border:"1px solid #ddd",borderRadius:8,background:disc===d?"#1a1a2e":"#fff",color:disc===d?"#fff":"#1a1a2e",fontWeight:600,fontSize:13,cursor:"pointer"}}>-{d}€</button>)}
              <input type="number" value={disc||""} onChange={e=>setDisc(parseFloat(e.target.value)||0)} placeholder="Autre…" min="0" style={{width:80,padding:"6px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,outline:"none"}}/>
            </div>
            <Lbl c="Paiement"/>
            <div style={{display:"flex",gap:6,marginBottom:10}}>
              {[{id:"especes",label:"💵 Espèces"},{id:"carte",label:"💳 Carte"},{id:"mixte",label:"🔀 Mixte"}].map(m=>(
                <button key={m.id} onClick={()=>setPay(m.id)} style={{flex:1,padding:"8px 4px",border:"1px solid #ddd",borderRadius:8,background:pay===m.id?"#1a1a2e":"#fff",color:pay===m.id?"#fff":"#1a1a2e",fontWeight:600,fontSize:12,cursor:"pointer"}}>{m.label}</button>
              ))}
            </div>
            <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,cursor:"pointer",fontSize:13}}>
              <input type="checkbox" checked={isDon} onChange={e=>setIsDon(e.target.checked)} style={{width:16,height:16}}/> 🎁 Don
            </label>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                {disc>0&&!isDon&&<p style={{margin:0,fontSize:12,color:"#aaa",textDecoration:"line-through"}}>{euro(raw)}</p>}
                <p style={{margin:0,fontWeight:900,fontSize:24,color:isDon?"#aaa":"#1a1a2e"}}>{isDon?"Don 🎁":euro(fin)}</p>
              </div>
              <button onClick={()=>onConfirm({discount:disc,isDonation:isDon,paymentMethod:pay,total:isDon?0:fin})} style={{padding:"14px 30px",background:"#1a6b3a",color:"#fff",border:"none",borderRadius:12,fontSize:16,fontWeight:700,cursor:"pointer"}}>✓ Valider</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── CATALOG ── */
function Catalog({event,onSale,onClose}){
  const[cart,setCart]=useState([]);
  const[showCart,setShowCart]=useState(false);
  const[fM,setFM]=useState("Tous");
  const[fC,setFC]=useState("Tous");
  const[toast,setToast]=useState(null);
  const products=event.products||[];
  const mangas=["Tous",...Array.from(new Set(products.map(p=>p.manga||"Autres"))).sort()];
  const activeCats=["Tous",...CATS.filter(c=>products.some(p=>p.category===c))];
  const visible=products.filter(p=>fM==="Tous"||(p.manga||"Autres")===fM).filter(p=>fC==="Tous"||p.category===fC).sort((a,b)=>(a.sortOrder||999)-(b.sortOrder||999));
  const grouped={};
  visible.forEach(p=>{const m=p.manga||"Autres";if(!grouped[m])grouped[m]={};if(!grouped[m][p.category])grouped[m][p.category]=[];grouped[m][p.category].push(p);});
  function add(p){setCart(prev=>{const ex=prev.find(i=>i.productId===p.id);if(ex)return prev.map(i=>i.productId===p.id?{...i,qty:i.qty+1}:i);return[...prev,{productId:p.id,name:p.name,price:p.price,qty:1,photo:p.photo}];});}
  function rem(id){setCart(prev=>{const ex=prev.find(i=>i.productId===id);if(ex&&ex.qty>1)return prev.map(i=>i.productId===id?{...i,qty:i.qty-1}:i);return prev.filter(i=>i.productId!==id);});}
  function confirm(opts){
    const sale={id:gid(),items:cart,cartTotal:cart.reduce((t,i)=>t+i.price*i.qty,0),discount:opts.discount,isDonation:opts.isDonation,paymentMethod:opts.paymentMethod,total:opts.total,timestamp:Date.now()};
    onSale(sale);const qty=cart.reduce((t,i)=>t+i.qty,0);
    setCart([]);setShowCart(false);setToast({qty,tot:opts.total,isDonation:opts.isDonation});setTimeout(()=>setToast(null),3000);
  }
  const cQ=cart.reduce((t,i)=>t+i.qty,0),cA=cart.reduce((t,i)=>t+i.price*i.qty,0);
  return(
    <div style={{position:"fixed",inset:0,zIndex:700,background:"#f8f7f5",display:"flex",flexDirection:"column"}}>
      {toast&&<div style={{position:"absolute",top:68,left:"50%",transform:"translateX(-50%)",zIndex:999,background:"#1a6b3a",color:"#fff",borderRadius:14,padding:"12px 20px",boxShadow:"0 4px 20px rgba(0,0,0,0.2)",display:"flex",alignItems:"center",gap:10,whiteSpace:"nowrap"}}>
        <span style={{fontSize:20}}>✅</span><div><p style={{margin:0,fontWeight:700,fontSize:14}}>{toast.isDonation?"Don enregistré !":"Vente enregistrée !"}</p><p style={{margin:"2px 0 0",fontSize:12,color:"rgba(255,255,255,0.8)"}}>{toast.qty} article{toast.qty>1?"s":""}{!toast.isDonation?" · "+euro(toast.tot):""}</p></div>
      </div>}
      <div style={{background:"#1a1a2e",color:"#fff",padding:"0.85rem 1rem",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <button onClick={onClose} style={{background:"none",border:"none",color:"rgba(255,255,255,0.7)",cursor:"pointer",fontSize:14}}>✕ Fermer</button>
        <span style={{fontWeight:700}}>Nouvelle vente</span>
        <button onClick={()=>setShowCart(true)} style={{background:cQ>0?"#1a6b3a":"rgba(255,255,255,0.15)",border:"none",borderRadius:10,padding:"8px 14px",color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14}}>🛒 {cQ>0?cQ+" · "+euro(cA):"Panier"}</button>
      </div>
      <div style={{background:"#fff",borderBottom:"1px solid #eee",flexShrink:0}}>
        <div style={{display:"flex",gap:6,overflowX:"auto",padding:"8px 1rem",scrollbarWidth:"none"}}>
          {mangas.map(m=><button key={m} onClick={()=>setFM(m)} style={{flexShrink:0,padding:"6px 14px",border:"none",borderRadius:20,background:fM===m?"#1a1a2e":"#f0eff0",color:fM===m?"#fff":"#1a1a2e",cursor:"pointer",fontWeight:fM===m?700:400,fontSize:13}}>{m}</button>)}
        </div>
        {activeCats.length>2&&<div style={{display:"flex",gap:6,overflowX:"auto",padding:"0 1rem 8px",scrollbarWidth:"none"}}>
          {activeCats.map(c=><button key={c} onClick={()=>setFC(c)} style={{flexShrink:0,padding:"4px 12px",border:"1px solid #ddd",borderRadius:16,background:fC===c?"#e8e8f4":"#fff",color:fC===c?"#1a1a2e":"#6b6b80",cursor:"pointer",fontWeight:fC===c?700:400,fontSize:12}}>{c}</button>)}
        </div>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0.75rem 0.9rem"}}>
        {products.length===0?<div style={{textAlign:"center",padding:"3rem",color:"#aaa"}}><p style={{fontSize:30}}>📦</p><p>Ajoute d'abord des produits</p></div>
        :Object.entries(grouped).map(([manga,catMap])=>(
          <div key={manga}>
            <p style={{margin:"14px 0 8px",fontSize:18,fontWeight:900,color:"#1a1a2e",borderBottom:"2.5px solid #1a1a2e",paddingBottom:4}}>{manga}</p>
            {Object.entries(catMap).map(([cat,ps])=>(
              <div key={cat}>
                <p style={{margin:"10px 0 8px",fontSize:15,fontWeight:800,color:"#555"}}>▸ {cat}</p>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(95px,1fr))",gap:8,marginBottom:8}}>
                  {ps.map(p=>{
                    const inCart=cart.find(i=>i.productId===p.id);const left=p.stock-(inCart?.qty||0);
                    return(<button key={p.id} onClick={()=>left>0&&add(p)} disabled={left<=0} style={{border:inCart?"2.5px solid #1a1a2e":"1px solid #e8e8ee",borderRadius:12,background:"#fff",cursor:left>0?"pointer":"not-allowed",opacity:left<=0?0.4:1,padding:0,overflow:"hidden",textAlign:"left"}}>
                      <div style={{width:"100%",paddingBottom:"100%",position:"relative",background:"#f4f3f0"}}>
                        {p.photo?<img src={p.photo} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>🖼️</div>}
                        {inCart&&<div style={{position:"absolute",top:4,right:4,background:"#1a1a2e",color:"#fff",borderRadius:10,padding:"2px 6px",fontSize:11,fontWeight:700}}>×{inCart.qty}</div>}
                        {p.isPack&&<div style={{position:"absolute",top:4,left:4,background:"#1a6b3a",color:"#fff",borderRadius:5,padding:"1px 5px",fontSize:9,fontWeight:700}}>LOT</div>}
                      </div>
                      <div style={{padding:"5px 7px 7px"}}>
                        <p style={{margin:0,fontSize:11,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</p>
                        <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}><span style={{fontSize:12,fontWeight:800,color:"#1a6b3a"}}>{euro(p.price)}</span><span style={{fontSize:9,color:left<=2?"#e05050":"#ccc"}}>{left}</span></div>
                      </div>
                    </button>);
                  })}
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>
      {showCart&&<Cart cart={cart} products={event.products||[]} onAdd={add} onRemove={rem} onConfirm={confirm} onClose={()=>setShowCart(false)}/>}
    </div>
  );
}

/* ── CANDIDATURE FORM ── */
function CandidatureForm({existing,onSave,onClose}){
  const[name,setName]=useState(existing?.name||"");
  const[city,setCity]=useState(existing?.city||"");
  const[ds,setDs]=useState(existing?.dateStart||"");
  const[de,setDe]=useState(existing?.dateEnd||"");
  const[statut,setStatut]=useState(existing?.statut||"prospect");
  const[visitors,setVisitors]=useState(existing?.visitors||"");
  const[standPrice,setStandPrice]=useState(existing?.standPrice||"");
  const[notes,setNotes]=useState(existing?.notes||"");
  const[website,setWebsite]=useState(existing?.website||"");
  const[deadline,setDeadline]=useState(existing?.deadline||"");
  const st=STATUTS.find(s=>s.id===statut);

    if(!name.trim()){alert("Nom requis");return;}
    if(!ds){alert("Date requise");return;}

  return(<>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>

          <span style={{fontSize:16}}>{s.emoji}</span>

      ))}
    </div>
    <Row label="Nom de la convention"><Inp value={name} onChange={setName} placeholder="Japan Expo…"/></Row>
    <Row label="Ville"><Inp value={city} onChange={setCity} placeholder="Paris, Lyon…"/></Row>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Row label="Date début"><Inp type="date" value={ds} onChange={setDs}/></Row>
      <Row label="Date fin"><Inp type="date" value={de} onChange={setDe}/></Row>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Row label="Visiteurs estimés"><Inp type="number" value={visitors} onChange={setVisitors} placeholder="5000" min="0"/></Row>
      <Row label="Prix stand (€)"><Inp type="number" value={standPrice} onChange={setStandPrice} placeholder="200" min="0"/></Row>

  </>);
}

/* ── PLANNING ── */
function Planning({candidatures,onSaveCandidature,onDeleteCandidature}){
  const[showForm,setShowForm]=useState(false);
  const[editCand,setEditCand]=useState(null);
  const[view,setView]=useState("cal");
  const[year,setYear]=useState(new Date().getFullYear());
  const[month,setMonth]=useState(new Date().getMonth());
  const[selected,setSelected]=useState(null);
  const today=new Date();
  const firstDow=(new Date(year,month,1).getDay()+6)%7;
  const totalDays=new Date(year,month+1,0).getDate();
  const alerts=candidatures.filter(c=>{if(!c.deadline||c.statut!=="prospect")return false;const d=Math.ceil((new Date(c.deadline)-today)/86400000);return d>=0&&d<=14;});
  function candForDay(day){const s=year+"-"+String(month+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");return candidatures.filter(c=>c.dateStart<=s&&c.dateEnd>=s);}
  function prevM(){if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}
  function nextM(){if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}
  const upcoming=[...candidatures].filter(c=>new Date(c.dateEnd)>=today).sort((a,b)=>a.dateStart.localeCompare(b.dateStart));
  const past=[...candidatures].filter(c=>new Date(c.dateEnd)<today).sort((a,b)=>b.dateStart.localeCompare(a.dateStart));
  const thisMo=candidatures.filter(c=>{const cs=new Date(c.dateStart),ce=new Date(c.dateEnd);return(cs.getMonth()===month&&cs.getFullYear()===year)||(ce.getMonth()===month&&ce.getFullYear()===year);});
  function editC(c){setEditCand(c);setShowForm(true);}
  function delC(id){if(confirm("Supprimer ?"))onDeleteCandidature(id);}
  return(
    <div style={{padding:"1rem 1.1rem"}}>
      {alerts.length>0&&<div style={{background:"#fff4ea",border:"1px solid #f5c894",borderRadius:10,padding:"10px 14px",marginBottom:12}}>
        <p style={{margin:"0 0 6px",fontWeight:700,fontSize:13,color:"#c07a20"}}>⚠️ Deadline proche</p>
        {alerts.map(c=>{const d=Math.ceil((new Date(c.deadline)-today)/86400000);return <p key={c.id} style={{margin:"2px 0",fontSize:12,color:"#6b6b80"}}><strong>{c.name}</strong> — {d===0?"Aujourd'hui !":d===1?"Demain":"J-"+d}</p>;})}
      </div>}
      <button onClick={()=>{setEditCand(null);setShowForm(true);}} style={{width:"100%",padding:"12px",background:"#1a1a2e",color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:14}}>+ Ajouter une convention</button>
      <div style={{display:"flex",background:"#f0f0f5",borderRadius:10,padding:3,marginBottom:14}}>
        {[{id:"cal",label:"📅 Calendrier"},{id:"list",label:"📋 Liste"}].map(v=>(
          <button key={v.id} onClick={()=>setView(v.id)} style={{flex:1,padding:"8px",border:"none",borderRadius:8,background:view===v.id?"#fff":"transparent",fontWeight:view===v.id?700:400,fontSize:13,cursor:"pointer",color:"#1a1a2e",boxShadow:view===v.id?"0 1px 4px rgba(0,0,0,0.1)":"none"}}>{v.label}</button>
        ))}
      </div>
      {view==="cal"&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <button onClick={prevM} style={{border:"none",background:"#f0f0f5",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:16,fontWeight:700}}>‹</button>
          <span style={{fontWeight:800,fontSize:17}}>{MOIS[month]} {year}</span>
          <button onClick={nextM} style={{border:"none",background:"#f0f0f5",borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:16,fontWeight:700}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {["L","M","M","J","V","S","D"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:11,fontWeight:700,color:"#aaa",padding:"4px 0"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {Array(firstDow).fill(null).map((_,i)=><div key={"e"+i}/>)}
          {Array(totalDays).fill(null).map((_,i)=>{
            const day=i+1,isToday=today.getDate()===day&&today.getMonth()===month&&today.getFullYear()===year;
            const dc=candForDay(day);
            return(<div key={day} onClick={()=>dc.length>0&&setSelected(dc[0])} style={{minHeight:52,background:isToday?"#f0f0ff":"#fff",border:isToday?"2px solid #6b7aed":"1px solid #f0f0f5",borderRadius:8,padding:"3px 4px",cursor:dc.length>0?"pointer":"default"}}>
              <p style={{margin:0,fontSize:12,fontWeight:isToday?800:500,color:isToday?"#6b7aed":"#1a1a2e"}}>{day}</p>
              {dc.slice(0,2).map(c=>{const st=STATUTS.find(s=>s.id===c.statut);return <div key={c.id} style={{marginTop:2,height:5,borderRadius:3,background:st?.color||"#aaa"}}/>;  })}
              {dc.length>2&&<p style={{margin:"2px 0 0",fontSize:8,color:"#aaa"}}>+{dc.length-2}</p>}
            </div>);

        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:14}}>
          {STATUTS.map(s=><div key={s.id} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#6b6b80"}}><div style={{width:10,height:10,borderRadius:3,background:s.color}}/>{s.label}</div>)}
        </div>
        {thisMo.length>0&&<div style={{marginTop:16}}>
          <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:"#6b6b80",textTransform:"uppercase"}}>Ce mois-ci</p>
          {[...thisMo].sort((a,b)=>a.dateStart.localeCompare(b.dateStart)).map(c=>{const st=STATUTS.find(s=>s.id===c.statut);return <CandCard key={c.id} c={c} st={st} onEdit={()=>editC(c)} onDelete={()=>delC(c.id)}/>;  })}
        </div>}
      </div>}
      {view==="list"&&<div>
        {upcoming.length>0&&<><p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:"#6b6b80",textTransform:"uppercase"}}>À venir</p>{upcoming.map(c=>{const st=STATUTS.find(s=>s.id===c.statut);return <CandCard key={c.id} c={c} st={st} onEdit={()=>editC(c)} onDelete={()=>delC(c.id)}/>;  })}</>}
        {past.length>0&&<><p style={{margin:"16px 0 8px",fontSize:11,fontWeight:700,color:"#aaa",textTransform:"uppercase"}}>Passées</p>{past.map(c=>{const st=STATUTS.find(s=>s.id===c.statut);return <CandCard key={c.id} c={c} st={st} onEdit={()=>editC(c)} onDelete={()=>delC(c.id)}/>;  })}</>}
        {candidatures.length===0&&<div style={{textAlign:"center",padding:"3rem",color:"#aaa"}}><p style={{fontSize:36}}>📅</p><p style={{fontWeight:600,color:"#6b6b80"}}>Aucune convention planifiée</p><p style={{fontSize:13}}>Ajoute tes futures conventions</p></div>}
      </div>}
      {selected&&<div style={{position:"fixed",inset:0,zIndex:900,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:"18px 18px 0 0",width:"100%",maxWidth:560,padding:"1.25rem"}}>
          {(()=>{const st=STATUTS.find(s=>s.id===selected.statut);return(<>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
              <div>
                <span style={{fontSize:10,background:st.bg,color:st.color,border:"1px solid "+st.border,padding:"2px 8px",borderRadius:10,fontWeight:700}}>{st.emoji} {st.label}</span>
                <h2 style={{margin:"6px 0 0",fontSize:18,fontWeight:800}}>{selected.name}</h2>
                <p style={{margin:"3px 0 0",fontSize:13,color:"#6b6b80"}}>{selected.city&&"📍 "+selected.city+" · "}{drange(selected.dateStart,selected.dateEnd)}</p>
              </div>
              <button onClick={()=>setSelected(null)} style={{border:"none",background:"#f0f0f5",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontWeight:700,color:"#6b6b80"}}>✕</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              {selected.visitors&&<div style={{background:"#f8f8fc",borderRadius:8,padding:"8px 10px"}}><p style={{margin:0,fontSize:9,color:"#aaa",textTransform:"uppercase"}}>Visiteurs</p><p style={{margin:"2px 0 0",fontWeight:700,fontSize:15}}>{parseInt(selected.visitors).toLocaleString("fr-FR")}</p></div>}
              {selected.standPrice&&<div style={{background:"#f8f8fc",borderRadius:8,padding:"8px 10px"}}><p style={{margin:0,fontSize:9,color:"#aaa",textTransform:"uppercase"}}>Prix stand</p><p style={{margin:"2px 0 0",fontWeight:700,fontSize:15}}>{euro(selected.standPrice)}</p></div>}
              {selected.deadline&&<div style={{background:"#fff4ea",borderRadius:8,padding:"8px 10px"}}><p style={{margin:0,fontSize:9,color:"#aaa",textTransform:"uppercase"}}>Deadline</p><p style={{margin:"2px 0 0",fontWeight:700,fontSize:13,color:"#c07a20"}}>{new Date(selected.deadline).toLocaleDateString("fr-FR")}</p></div>}
              {selected.website&&<div style={{background:"#f8f8fc",borderRadius:8,padding:"8px 10px"}}><p style={{margin:0,fontSize:9,color:"#aaa",textTransform:"uppercase"}}>Site</p><a href={selected.website} target="_blank" style={{fontWeight:600,fontSize:12,color:"#6b7aed",textDecoration:"none"}}>Ouvrir ↗</a></div>}
            </div>
            {selected.notes&&<div style={{background:"#f8f8fc",borderRadius:8,padding:"10px 12px",marginBottom:12,fontSize:13,color:"#444",lineHeight:1.5}}>{selected.notes}</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{editC(selected);setSelected(null);}} style={{flex:1,padding:"11px",border:"1px solid #ddd",borderRadius:9,background:"none",cursor:"pointer",fontWeight:700,fontSize:13}}>✏️ Modifier</button>
              <button onClick={()=>{delC(selected.id);setSelected(null);}} style={{padding:"11px 16px",border:"1px solid #ffd4d4",borderRadius:9,background:"none",cursor:"pointer",fontWeight:700,fontSize:13,color:"#e05050"}}>🗑️</button>
            </div>
          </>);}  )()}
        </div>
      </div>}
      {showForm&&<Sheet title={editCand?"Modifier":"Ajouter une convention"} onClose={()=>{setShowForm(false);setEditCand(null);}}>
        <CandidatureForm existing={editCand} onSave={c=>{onSaveCandidature(c);setShowForm(false);setEditCand(null);}} onClose={()=>{setShowForm(false);setEditCand(null);}}/>
      </Sheet>}
    </div>
  );
}

/* ── GLOBAL STATS ── */
function GlobalStats({events}){
  const[sort,setSort]=useState("net");
  const wc=events.map(ev=>({ev,c:calcEv(ev)}));
  // Calcul marge moyenne globale sur tous les produits de tous les événements
  const allProds=events.flatMap(ev=>ev.products||[]).filter(p=>parseFloat(p.price)>0&&parseFloat(p.costPrice)>=0);
  const globalAvgMarg=allProds.length>0
    ?(allProds.reduce((t,p)=>t+((p.price-(p.costPrice||0))/p.price)*100,0)/allProds.length)
    :null;
  const totals=wc.reduce((a,{ev,c})=>({
    gross:a.gross+c.gross,fixed:a.fixed+c.fixed,cogs:a.cogs+c.cogs,net:a.net+c.net,count:a.count+c.count,
    stand:a.stand+(parseFloat(ev.costs?.ticket)||0),
    airbnb:a.airbnb+(parseFloat(ev.costs?.airbnb)||0),
    transport:a.transport+(parseFloat(ev.costs?.transport)||0),
    other:a.other+(parseFloat(ev.costs?.other)||0),
    avgMargPct:globalAvgMarg,
  }),{gross:0,fixed:0,cogs:0,net:0,count:0,stand:0,airbnb:0,transport:0,other:0,avgMargPct:globalAvgMarg});
  const SORTS=[{id:"net",label:"Meilleur net",icon:"🏆",fn:(a,b)=>b.c.net-a.c.net},{id:"gross",label:"Meilleur brut",icon:"💰",fn:(a,b)=>b.c.gross-a.c.gross},{id:"cheapest",label:"Moins cher",icon:"📉",fn:(a,b)=>a.c.fixed-b.c.fixed},{id:"costliest",label:"Plus coûteux",icon:"📈",fn:(a,b)=>b.c.fixed-a.c.fixed},{id:"date",label:"Plus récent",icon:"📅",fn:(a,b)=>new Date(b.ev.dateStart||b.ev.date)-new Date(a.ev.dateStart||a.ev.date)}];
  const sorted=[...wc].sort(SORTS.find(s=>s.id===sort)?.fn||(()=>0));
  const getVal=({ev,c})=>sort==="date"?c.count+" ventes":sort==="cheapest"||sort==="costliest"?euro(c.fixed):sort==="gross"?euro(c.gross):euro(c.net);
  return(
    <div style={{padding:"1rem 1.1rem"}}>
      <div style={{background:"#1a1a2e",borderRadius:14,padding:"1.25rem",marginBottom:12,color:"#fff"}}>
        <p style={{margin:"0 0 14px",fontSize:11,color:"rgba(255,255,255,0.45)",textTransform:"uppercase",letterSpacing:"0.05em"}}>Bilan global · {events.length} événement{events.length>1?"s":""} · {totals.count} ventes</p>
        {/* CA brut seul en grand */}
        <div style={{background:"rgba(111,207,151,0.15)",borderRadius:10,padding:"12px 14px",marginBottom:10}}>
          <p style={{margin:0,fontSize:10,color:"rgba(255,255,255,0.5)",textTransform:"uppercase"}}>CA brut total</p>
          <p style={{margin:"5px 0 0",fontWeight:900,fontSize:30,color:"#6fcf97"}}>{euro(totals.gross)}</p>
        </div>
        {/* Net en dessous */}
        <div style={{background:totals.net>=0?"rgba(111,207,151,0.15)":"rgba(235,87,87,0.15)",borderRadius:10,padding:"12px 14px",marginBottom:totals.avgMargPct?8:14}}>
          <p style={{margin:0,fontSize:10,color:"rgba(255,255,255,0.5)",textTransform:"uppercase"}}>Net (après frais fixes)</p>
          <p style={{margin:"5px 0 0",fontWeight:900,fontSize:30,color:totals.net>=0?"#6fcf97":"#eb5757"}}>{euro(totals.net)}</p>
          <p style={{margin:"4px 0 0",fontSize:10,color:"rgba(255,255,255,0.35)"}}>brut − frais stands, transport, airbnb…</p>
        </div>
        {/* Net net si marge globale calculable */}
        {totals.avgMargPct&&(()=>{
          const provCogs=totals.gross*(1-totals.avgMargPct/100);
          const netNet=totals.net-provCogs;
          const pct=totals.gross>0?((netNet/totals.gross)*100).toFixed(1):null;
          return(
            <div style={{background:netNet>=0?"rgba(111,207,151,0.12)":"rgba(235,87,87,0.12)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
              <p style={{margin:0,fontSize:10,color:"rgba(255,255,255,0.5)",textTransform:"uppercase"}}>Net net (après frais + coût produits estimé)</p>
              <p style={{margin:"5px 0 0",fontWeight:900,fontSize:28,color:netNet>=0?"#6fcf97":"#eb5757"}}>{euro(netNet)}</p>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
                <p style={{margin:0,fontSize:10,color:"rgba(255,255,255,0.35)"}}>provision marchandises ≈ {euro(provCogs)} ({(100-totals.avgMargPct).toFixed(0)}% du brut)</p>
                {pct&&<span style={{fontSize:12,fontWeight:700,color:pct>=0?"#6fcf97":"#eb5757"}}>{pct}%</span>}
              </div>
            </div>
          );
        })()}
        {/* Détail frais */}
        <div style={{borderTop:"1px solid rgba(255,255,255,0.1)",paddingTop:14}}>

            <summary style={{cursor:"pointer",fontSize:11,color:"#6b6b80",padding:"4px 0",userSelect:"none"}}>

            </div>
          </details>
        </div>
      ))}
    </div>
  );
}

/* ── BACKUP ── */
function BackupTab({events,candidatures,onImport}){
  const[status,setStatus]=useState(null);
  const ref=useRef();
  function doExport(){
    const blob=new Blob([JSON.stringify({version:3,exportedAt:new Date().toISOString(),events,candidatures},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="yokata_"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(url);
  }
  function doImport(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{try{const p=JSON.parse(ev.target.result),d=p.events||(Array.isArray(p)?p:null);if(!d){setStatus("error");return;}onImport(d,p.candidatures||[]);setStatus("ok");setTimeout(()=>setStatus(null),3000);}catch{setStatus("error");setTimeout(()=>setStatus(null),3000);}};
    r.readAsText(f);e.target.value="";
  }
  return(
    <div style={{padding:"1rem 1.1rem"}}>
      <input ref={ref} type="file" accept=".json" onChange={doImport} style={{display:"none"}}/>
      {status==="ok"&&<div style={{background:"#e8f5e8",border:"1px solid #a8d8a8",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,color:"#1a6b3a",fontWeight:600}}>✅ Import réussi !</div>}
      {status==="copied"&&<div style={{background:"#e8f5e8",border:"1px solid #a8d8a8",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,color:"#1a6b3a",fontWeight:600}}>✅ Lien copié !</div>}
      {status==="error"&&<div style={{background:"#fde8e8",border:"1px solid #f5a8a8",borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:13,color:"#c0392b",fontWeight:600}}>❌ Fichier invalide</div>}
      {/* Partage du lien */}
      <div style={{background:"#1a1a2e",borderRadius:12,padding:"1.1rem",marginBottom:14,color:"#fff"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <span style={{fontSize:26}}>🔗</span>
          <div><p style={{margin:0,fontWeight:700,fontSize:14}}>Partager l'appli</p><p style={{margin:"2px 0 0",fontSize:12,color:"rgba(255,255,255,0.5)"}}>Ouvre l'appli sur un autre appareil</p></div>
        </div>
        <button onClick={()=>{
          const url=window.location.href;
          if(navigator.share){navigator.share({title:"Yokata Catalogue",url});}
          else{navigator.clipboard.writeText(url).then(()=>{setStatus("copied");setTimeout(()=>setStatus(null),3000);});}
        }} style={{width:"100%",padding:"12px",background:"rgba(255,255,255,0.15)",color:"#fff",border:"1px solid rgba(255,255,255,0.2)",borderRadius:9,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:8}}>
          📤 Partager le lien de l'appli
        </button>
        <div style={{background:"rgba(255,255,255,0.08)",borderRadius:8,padding:"10px 12px"}}>
          <p style={{margin:"0 0 4px",fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.8)"}}>📲 Pour synchroniser entre appareils :</p>
          <p style={{margin:"0 0 6px",fontSize:11,color:"rgba(255,255,255,0.5)",lineHeight:1.5}}>1. Ouvre le lien sur le nouvel appareil<br/>2. Exporte tes données (bouton ci-dessous)<br/>3. Envoie le fichier JSON par WhatsApp ou mail<br/>4. Importe-le sur le nouvel appareil</p>
          <p style={{margin:0,fontSize:10,color:"rgba(255,255,255,0.35)"}}>💡 Pour une synchro automatique, Firebase peut être configuré (voir paramètres)</p>
        </div>
      </div>
      <div style={{background:"#fff",border:"1px solid #eee",borderRadius:12,padding:"1.1rem",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><span style={{fontSize:26}}>💾</span><div><p style={{margin:0,fontWeight:700,fontSize:14}}>Exporter mes données</p><p style={{margin:"2px 0 0",fontSize:12,color:"#6b6b80"}}>{events.length} événement{events.length>1?"s":""}  + planning</p></div></div>
        <button onClick={doExport} style={{width:"100%",padding:"11px",background:"#1a1a2e",color:"#fff",border:"none",borderRadius:9,fontSize:13,fontWeight:700,cursor:"pointer"}}>⬇️ Télécharger le fichier JSON</button>
      </div>
      <div style={{background:"#fff",border:"1px solid #eee",borderRadius:12,padding:"1.1rem",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><span style={{fontSize:26}}>📂</span><div><p style={{margin:0,fontWeight:700,fontSize:14}}>Importer des données</p><p style={{margin:"2px 0 0",fontSize:12,color:"#6b6b80"}}>Restaure un fichier exporté</p></div></div>
        <button onClick={()=>ref.current.click()} style={{width:"100%",padding:"11px",border:"1px dashed #ccc",borderRadius:9,background:"#f8f8fc",cursor:"pointer",fontSize:13,fontWeight:600}}>⬆️ Choisir un fichier JSON</button>
        <p style={{margin:"7px 0 0",fontSize:11,color:"#e05050"}}>⚠️ L'import remplace toutes tes données</p>
      </div>
      <div style={{background:"#f0f4ff",border:"1px solid #c0d0f0",borderRadius:12,padding:"1rem 1.1rem"}}>
        <p style={{margin:"0 0 5px",fontWeight:600,fontSize:13}}>💡 Conseil</p>
        <p style={{margin:0,fontSize:12,color:"#4a5a80",lineHeight:1.6}}>Exporte régulièrement et mets le fichier sur Google Drive ou iCloud.</p>
      </div>
    </div>
  );
}

/* ── EVENT DETAIL ── */
function EventDetail({event,onUpdate,onBack}){
  const[tab,setTab]=useState("dash");
  const[showCat,setShowCat]=useState(false);
  const[showProd,setShowProd]=useState(false);
  const[editProd,setEditProd]=useState(null);
  const[editCosts,setEditCosts]=useState(false);
  const[costsS,setCostsS]=useState(event.costs||{});
  const sales=event.sales||[],products=event.products||[],photos=event.eventPhotos||[];
  const c=calcEv(event),toRec=Math.max(0,c.fixed+c.cogs-c.gross);
  const mangaList=[...new Set(products.map(p=>p.manga).filter(Boolean))];
  const TABS=[{id:"dash",label:"Dashboard"},{id:"prod",label:"Produits"},{id:"sales",label:"Ventes"},{id:"costs",label:"Frais"},{id:"photos",label:"Photos"},{id:"recap",label:"Récap"}];
  function handleSale(sale){const ns=[...sales,sale];const np=products.map(p=>{const it=sale.items.find(i=>i.productId===p.id);return it?{...p,stock:Math.max(0,p.stock-it.qty)}:p;});onUpdate({...event,sales:ns,products:np});}
  function saveProd(prod){const ex=products.find(p=>p.id===prod.id);onUpdate({...event,products:ex?products.map(p=>p.id===prod.id?prod:p):[...products,prod]});setEditProd(null);}
  function delProd(id){if(!confirm("Supprimer ?"))return;onUpdate({...event,products:products.filter(p=>p.id!==id)});}
  function delSale(id){if(!confirm("Supprimer cette vente ?"))return;const sale=sales.find(s=>s.id===id);onUpdate({...event,sales:sales.filter(s=>s.id!==id),products:products.map(p=>{const it=sale?.items.find(i=>i.productId===p.id);return it?{...p,stock:p.stock+it.qty}:p;})});}
  function saveCosts(){const t=Object.values(costsS).reduce((s,v)=>s+(parseFloat(v)||0),0);onUpdate({...event,costs:costsS,totalCosts:t});setEditCosts(false);}
  function addPhotos(e){Promise.all(Array.from(e.target.files).map(f=>new Promise(res=>{const r=new FileReader();r.onload=ev=>res({id:gid(),src:ev.target.result,caption:"",addedAt:Date.now()});r.readAsDataURL(f);}))).then(np=>onUpdate({...event,eventPhotos:[...photos,...np]}));e.target.value="";}
  return(
    <div style={{minHeight:"100vh",background:"#f8f7f5"}}>
      <div style={{background:"#1a1a2e",color:"#fff",padding:"1rem 1.1rem"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:13,marginBottom:8,padding:0}}>← Tous les événements</button>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div><h1 style={{margin:0,fontSize:19,fontWeight:800}}>{event.name}</h1><p style={{margin:"2px 0 0",color:"rgba(255,255,255,0.5)",fontSize:12}}>{event.location&&event.location+" · "}{drange(event.dateStart||event.date,event.dateEnd)}</p></div>
          <button onClick={()=>setShowCat(true)} style={{background:"#fff",color:"#1a1a2e",border:"none",borderRadius:10,padding:"10px 16px",fontWeight:700,cursor:"pointer",fontSize:14}}>+ Vente</button>
        </div>
        {(()=>{
          const evProds=products.filter(p=>p.price>0&&p.costPrice>=0);
          const evAvgMarg=evProds.length>0?(evProds.reduce((t,p)=>t+((p.price-(p.costPrice||0))/p.price)*100,0)/evProds.length):null;
          const provCogs=evAvgMarg!==null?c.gross*(1-evAvgMarg/100):null;
          const netNet=provCogs!==null?c.net-provCogs:null;
          return(<>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:12}}>
              <div style={{background:"rgba(255,255,255,0.08)",borderRadius:10,padding:"9px 10px"}}>
                <p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.5)",textTransform:"uppercase"}}>CA Brut</p>
                <p style={{margin:"3px 0 0",fontWeight:700,fontSize:14,color:"#6fcf97"}}>{euro(c.gross)}</p>
              </div>
              <div style={{background:"rgba(255,255,255,0.08)",borderRadius:10,padding:"9px 10px"}}>
                <p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.5)",textTransform:"uppercase"}}>Frais fixes</p>
                <p style={{margin:"3px 0 0",fontWeight:700,fontSize:14,color:"#eb5757"}}>{euro(c.fixed)}</p>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:netNet!==null?"1fr 1fr":"1fr",gap:8,marginTop:8}}>
              <div style={{background:"rgba(255,255,255,0.08)",borderRadius:10,padding:"9px 10px"}}>
                <p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.5)",textTransform:"uppercase"}}>Net (brut − frais)</p>
                <p style={{margin:"3px 0 0",fontWeight:700,fontSize:14,color:c.net>=0?"#6fcf97":"#eb5757"}}>{euro(c.net)}</p>
              </div>
              {netNet!==null&&<div style={{background:"rgba(255,255,255,0.08)",borderRadius:10,padding:"9px 10px",border:"1px solid rgba(107,122,237,0.4)"}}>
                <p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.5)",textTransform:"uppercase"}}>Net net (− produits)</p>
                <p style={{margin:"3px 0 0",fontWeight:700,fontSize:14,color:netNet>=0?"#6fcf97":"#eb5757"}}>{euro(netNet)}</p>
                <p style={{margin:"2px 0 0",fontSize:8,color:"rgba(255,255,255,0.3)"}}>marge {evAvgMarg.toFixed(0)}%</p>
              </div>}
            </div>
          </>);
        })()}
        {toRec>0&&<div style={{marginTop:8,background:"rgba(235,87,87,0.2)",border:"1px solid rgba(235,87,87,0.4)",borderRadius:8,padding:"7px 12px",fontSize:12}}>🔴 Encore <strong>{euro(toRec)}</strong> pour être bénéficiaire</div>}
        {c.net>0&&<div style={{marginTop:8,background:"rgba(111,207,151,0.2)",border:"1px solid rgba(111,207,151,0.4)",borderRadius:8,padding:"7px 12px",fontSize:12}}>🟢 Bénéfice net : <strong>{euro(c.net)}</strong></div>}
      </div>
      <div style={{overflowX:"auto",scrollbarWidth:"none"}}>
        <div style={{display:"flex",background:"#fff",borderBottom:"1px solid #eee",minWidth:"max-content"}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"11px 16px",border:"none",background:"none",cursor:"pointer",fontSize:13,fontWeight:tab===t.id?700:400,color:tab===t.id?"#1a1a2e":"#6b6b80",borderBottom:tab===t.id?"2.5px solid #1a1a2e":"2.5px solid transparent",whiteSpace:"nowrap"}}>{t.label}</button>)}
